<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111827;
position:sticky;
top:0;
z-index:10;
}

.logo{
color:#38bdf8;
font-weight:bold;
font-size:20px;
}

.search input{
padding:8px;
border-radius:8px;
border:none;
outline:none;
width:180px;
}

.cartBtn{
background:#38bdf8;
color:black;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

/* PRODUCTS */
.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
flex:1;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
display:flex;
flex-direction:column;
justify-content:space-between;
height:140px;
}

.card h3{
margin:0;
font-size:16px;
}

.add{
margin-top:10px;
padding:8px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
background:#22c55e;
}

/* CART */
.box{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.form{
background:white;
color:black;
padding:20px;
border-radius:12px;
width:320px;
display:flex;
flex-direction:column;
gap:8px;
}

.form input{
padding:8px;
border:1px solid #ccc;
border-radius:6px;
}

.list{
background:#f3f3f3;
color:black;
padding:6px;
border-radius:6px;
font-size:13px;
}

/* FOOTER */
footer{
margin-top:auto;
padding:25px;
background:#0b1220;
text-align:center;
border-top:1px solid #1f2937;
}

.social{
display:flex;
justify-content:center;
gap:15px;
margin-top:10px;
}

.icon{
width:38px;
height:38px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.insta{background:#E1306C;}
.fb{background:#1877F2;}
.tiktok{background:#000;}

.icon svg{
width:18px;
height:18px;
fill:white;
}
</style>
</head>

<body>

<header>
<div class="logo">MY SHOP</div>

<div class="search">
<input id="search" placeholder="ძიება...">
</div>

<div class="cartBtn" onclick="openCart()">🛒 <span id="count">0</span></div>
</header>

<!-- PRODUCTS -->
<div class="container">

<div class="card">
<h3>პროდუქტი 1</h3>
<p>20₾</p>
<button class="add" onclick="add('პროდუქტი 1',20)">დამატება</button>
</div>

<div class="card">
<h3>პროდუქტი 2</h3>
<p>35₾</p>
<button class="add" onclick="add('პროდუქტი 2',35)">დამატება</button>
</div>

<div class="card">
<h3>პროდუქტი 3</h3>
<p>50₾</p>
<button class="add" onclick="add('პროდუქტი 3',50)">დამატება</button>
</div>

</div>

<!-- CART -->
<div class="box" id="box">
<div class="form">

<h3>🛒 კალათა</h3>

<div id="list"></div>
<p><b>ჯამი:</b> <span id="total">0</span>₾</p>

<hr>

<input id="name" placeholder="სახელი">
<input id="surname" placeholder="გვარი">
<input id="phone" placeholder="ტელეფონი">
<input id="email" placeholder="Gmail">
<input id="address" placeholder="მისამართი">

<button onclick="send()" style="background:#22c55e;color:white;">შეკვეთა</button>
<button onclick="closeCart()" style="background:red;color:white;">დახურვა</button>

</div>
</div>

<!-- FOOTER -->
<footer>

<p>📧 email@example.com <br>| <br> 📞 +995 555 55 55 55</p>

<div class="social">

<div class="icon insta">
<svg viewBox="0 0 24 24">
<path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5zm5 5a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"/>
</svg>
</div>

<div class="icon fb">
<svg viewBox="0 0 24 24">
<path d="M22 12a10 10 0 1 0-11 10v-7H8v-3h3v-2a3 3 0 0 1 3-3h3v3h-2a1 1 0 0 0-1 1v2h3l-1 3h-2v7a10 10 0 0 0 5-10z"/>
</svg>
</div>

<div class="icon tiktok">
<svg viewBox="0 0 24 24">
<path d="M21 8a6 6 0 0 1-5-5h-3v12a3 3 0 1 1-3-3V8a6 6 0 1 0 6 6V9a9 9 0 0 0 5 2V8z"/>
</svg>
</div> 
 
</div>
<p style="color:#64748b;">© 2026 My Shop</p>
</footer>

<script>

let cart=[];

function add(name,price){
cart.push({name,price});
update();
}

function update(){
document.getElementById("count").innerText=cart.length;

let list="";
let total=0;

cart.forEach((c,i)=>{
list += `<div>${i+1}. ${c.name} - ${c.price}₾</div>`;
total += c.price;
});

document.getElementById("list").innerHTML=list;
document.getElementById("total").innerText=total;
}

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
let v=e.target.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"flex":"none";
});
});

/* CART */
function openCart(){
document.getElementById("box").style.display="flex";
update();
}

function closeCart(){
document.getElementById("box").style.display="none";
}

/* SEND */
function send(){

if(cart.length===0){
alert("კალათა ცარიელია");
return;
}

let name=document.getElementById("name").value.trim();
let surname=document.getElementById("surname").value.trim();
let phone=document.getElementById("phone").value.trim();
let email=document.getElementById("email").value.trim();
let address=document.getElementById("address").value.trim();

if(!name || !surname || !phone || !email || !address){
alert("შეავსე ყველა ველი");
return;
}

let items=cart.map(c=>`- ${c.name} (${c.price}₾)`).join("\n");
let total=cart.reduce((a,b)=>a+b.price,0);

let msg=`🛒 ORDER\n${items}\nTOTAL: ${total}₾\n\n${name} ${surname}\n${phone}\n${email}\n${address}`;

let BOT_TOKEN="8651254889:AAFJnC-8VI2f9VY7Y6Ub2_4ViIRZzb0RIPY";
let CHAT_ID="8170085154";

fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id: CHAT_ID,
text: msg
})
})
.then(res => res.json())
.then(data => {
console.log(data);

if(data.ok){
alert("გაიგზავნა Telegram-ში ✅");
cart=[];
update();
closeCart();
}else{
alert("Telegram error ❌");
console.log(data);
}
})
.catch(err=>{
alert("ქსელის შეცდომა ❌");
console.log(err);
});

alert("გაიგზავნა");
cart=[];
update();
closeCart();
}

</script>

</body>
</html>
